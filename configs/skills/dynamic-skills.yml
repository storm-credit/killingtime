version: 2
name: killingtime-dynamic-skills

dynamic_skills:
  - id: detect-burned-in-subs
    status: active
    activation_rule: always on for YouTube long-form intake
    owner: hardsub-detector
    purpose: scan sampled frames with OCR and report burned-in subtitle region and language

  - id: rank-source-tracks
    status: active
    activation_rule: always on
    owner: language-gate
    purpose: rank available subtitle tracks by harness.source_preference and pick best source

  - id: enforce-delivery-exclude
    status: active
    activation_rule: always on at export
    owner: language-gate
    purpose: ensure packaged subtitle set excludes delivery_exclude languages

  - id: inpaint-hardsub-region
    status: active
    activation_rule: activate when detect-burned-in-subs confidence is high
    owner: hardsub-inpainter
    purpose: mask and clean the burned-in subtitle region using ffmpeg filters or opencv inpaint

  - id: llm-translate-natural
    status: active
    activation_rule: always on
    owner: llm-translator
    purpose: translate source srt into ko and es preserving cue structure with natural register; provider pluggable

  - id: compose-upload-guide
    status: active
    activation_rule: run at export stage when delivery scope is local
    owner: upload-guide-writer
    purpose: author a markdown guide that lists files, recommended YouTube metadata, and sidecar caption upload steps

  - id: align-scene-ocr-zones
    status: optional
    activation_rule: enable when hardcoded subtitles are frequent or stylized

  - id: enforce-series-termbase
    status: optional
    activation_rule: enable when a project becomes episodic
