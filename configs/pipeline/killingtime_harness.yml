version: 2
name: killingtime-subtitle-harness
domain: media-localization
principle: fixed-core-extendable-edge
mode: subtitle-first

targets:
  - ko
  - es

delivery_exclude:
  - zh
  - zh-Hans
  - zh-Hant
  - en

source_preference:
  - zh-Hans
  - zh-Hant
  - zh
  - ja
  - ko
  - en

hardsub:
  default_mode: keep
  modes:
    - keep
    - clean

hooks:
  - intake
  - context
  - route
  - hardsub-gate
  - lang-filter-gate
  - translation-engine-gate
  - review
  - publish

stage_order:
  - intake
  - source_probe
  - subtitle_discovery
  - source_extraction
  - translation
  - qa
  - export

stages:
  - id: intake
    owner: orchestra-lead
    output: normalized-task-brief
    success_definition: request has source url, targets, constraints, and delivery expectations
  - id: source_probe
    owner: hardsub-detector
    output: source-probe-report
    success_definition: hardsub presence and available subtitle tracks are recorded with confidence
  - id: subtitle_discovery
    owner: subtitle-discovery-agent
    output: subtitle-availability-report
    success_definition: existing subs are confirmed or missing-state is explicit after zh/en filter
  - id: source_extraction
    owner: source-extraction-lead
    output: source-srt
    success_definition: source language subtitle file exists with cue timings and hardsub region cleared if present
  - id: translation
    owner: claude-translator
    output: ko-es-localization-drafts
    success_definition: target drafts preserve cue structure and read naturally in ko and es
  - id: qa
    owner: subtitle-qa-reviewer
    output: approved-or-rework-decision
    success_definition: timing, readability, and terminology checks are passed
  - id: export
    owner: packaging-operator
    output: export-package
    success_definition: final mp4, ko.srt, es.srt and upload guide are assembled

download:
  container: mp4
  video_codec: h264
  audio_codec: aac
  format_expression: "bv*[ext=mp4]+ba[ext=m4a]/bv*+ba/b"
  merge_output_format: mp4

translation_engine:
  default: local
  style: natural-spoken
  preserve_cues: true
  providers:
    local:
      runtime: ollama
      base_url: http://localhost:11434
      model: qwen2.5:7b
    claude:
      runtime: anthropic
      model: claude-sonnet-4-6
      env_key: ANTHROPIC_API_KEY
    gemini:
      runtime: google
      model: gemini-2.0-flash
      env_key: GEMINI_API_KEY
    vertex:
      runtime: vertex
      model: gemini-2.5-flash
      project: neonexorcist
      location: us-central1
      env_key: GOOGLE_APPLICATION_CREDENTIALS
    gpt:
      runtime: openai
      model: gpt-4o-mini
      env_key: OPENAI_API_KEY

fallbacks:
  source_probe:
    preferred:
      - ocr_sample_scan
    fallback:
      - skip_hardsub_check
  subtitle_discovery:
    preferred:
      - platform_subtitles
      - embedded_subtitles
    fallback:
      - asr
      - ocr
  source_extraction:
    preferred:
      - yt_dlp_subtitles
      - source_vtt_to_srt
    fallback:
      - faster_whisper
      - paddle_ocr
  hardsub_cleanup:
    preferred:
      - keep_and_overlay
    fallback:
      - masked_region_inpaint

extension_points:
  agents: configs/agents/dynamic-agents.yml
  skills: configs/skills/dynamic-skills.yml
  hooks: configs/hooks/dynamic-hooks.yml
  mcp: configs/mcp/context-broker.yml
