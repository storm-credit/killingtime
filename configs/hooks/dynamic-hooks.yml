version: 2
name: killingtime-dynamic-hooks

dynamic_hooks:
  - id: hardsub-gate
    status: active
    activation_rule: always on for YouTube long-form intake
    owner: hardsub-detector
    check:
      - hardsub probe completed
      - region recorded if detected
      - inpaint path chosen or skip logged

  - id: lang-filter-gate
    status: active
    activation_rule: always on
    owner: language-gate
    check:
      - source track chosen per source_preference
      - delivery package excludes delivery_exclude languages
      - chosen source language logged

  - id: translation-engine-gate
    status: active
    activation_rule: always on
    owner: llm-translator
    check:
      - selected provider resolvable in translation_engine.providers
      - required env_key present for paid providers (claude/gemini/gpt)
      - local runtime reachable at base_url for ollama
      - cue count preserved after translation

  - id: glossary-refresh
    status: optional
    activation_rule: enable when glossary drift appears across projects

  - id: platform-export-map
    status: optional
    activation_rule: enable when multiple downstream delivery formats are required
